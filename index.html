<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Control de Ponches</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f1f5f9;color:#1e293b;font-size:14px}
.hidden{display:none!important}
.login-container{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#1e3a5f,#3b82f6);padding:1rem}
.login-card{background:#fff;border-radius:1rem;padding:2.5rem 2rem;width:100%;max-width:380px;box-shadow:0 25px 50px -12px rgba(0,0,0,.25);text-align:center}
.login-card h1{font-size:1.5rem;font-weight:700;margin-bottom:.25rem}
.login-card .subtitle{color:#94a3b8;font-size:.85rem;margin-bottom:1.75rem}
.login-card input{width:100%;padding:.75rem 1rem;border:1.5px solid #e2e8f0;border-radius:.65rem;font-size:.95rem;margin-bottom:.75rem;outline:none}
.login-card input:focus{border-color:#2563eb;box-shadow:0 0 0 3px #dbeafe}
.login-card button{width:100%;padding:.75rem;background:#2563eb;color:#fff;border:none;border-radius:.65rem;font-size:1rem;font-weight:600;cursor:pointer}
.login-card button:hover{background:#1d4ed8}
.login-card .error{color:#dc2626;font-size:.8rem;margin-top:.5rem;min-height:1.2rem}
.app-container{max-width:1200px;margin:0 auto;padding:1rem}
.topbar{display:flex;align-items:center;justify-content:space-between;background:#fff;padding:.6rem 1rem;border-radius:.75rem;box-shadow:0 1px 3px rgba(0,0,0,.08);margin-bottom:1rem;flex-wrap:wrap;gap:.5rem}
.topbar h2{font-size:1.1rem;font-weight:700;color:#2563eb}
.topbar .badge{font-size:.75rem;background:#dbeafe;color:#2563eb;padding:.2rem .55rem;border-radius:999px;font-weight:600}
.topbar-actions{display:flex;gap:.4rem;flex-wrap:wrap}
.btn{padding:.45rem .85rem;border-radius:.5rem;font-size:.75rem;font-weight:600;border:none;cursor:pointer;display:inline-flex;align-items:center;gap:.35rem;white-space:nowrap}
.btn-primary{background:#2563eb;color:#fff}
.btn-outline{background:transparent;border:1.5px solid #e2e8f0;color:#1e293b}
.btn-outline:hover{background:#f1f5f9}
.btn-danger{background:#dc2626;color:#fff}
.btn-success{background:#16a34a;color:#fff}
.btn-sm{padding:.35rem .6rem;font-size:.7rem}
.filters{display:flex;gap:.5rem;margin-bottom:.75rem;flex-wrap:wrap;align-items:center}
.filters select,.filters input{padding:.45rem .65rem;border:1.5px solid #e2e8f0;border-radius:.5rem;font-size:.8rem;outline:none;background:#fff}
.filters select:focus,.filters input:focus{border-color:#2563eb}
.filters .search-wrap{display:flex;align-items:center;gap:.35rem;background:#fff;border:1.5px solid #e2e8f0;border-radius:.5rem;padding:0 .55rem}
.filters .search-wrap input{border:none;padding:.4rem 0;font-size:.8rem;min-width:160px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:.5rem;margin-bottom:.75rem}
.stat-card{background:#fff;border-radius:.5rem;padding:.6rem .75rem;text-align:center;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.stat-card .label{font-size:.65rem;color:#94a3b8;text-transform:uppercase;font-weight:600}
.stat-card .value{font-size:1.3rem;font-weight:700;margin-top:.15rem}
.table-wrap{background:#fff;border-radius:.75rem;overflow-x:auto;box-shadow:0 1px 3px rgba(0,0,0,.06);margin-bottom:1rem}
table{width:100%;border-collapse:collapse;font-size:.8rem}
th{background:#f8fafc;text-align:left;padding:.6rem .65rem;font-weight:600;color:#64748b;font-size:.7rem;text-transform:uppercase;position:sticky;top:0;z-index:1;white-space:nowrap}
td{padding:.55rem .65rem;border-top:1px solid #f1f5f9;white-space:nowrap}
tr:hover td{background:#f8fafc}
.store-header td{background:#eef2ff;font-weight:700;color:#4f46e5;font-size:.85rem;padding:.5rem .65rem}
.row-sinponche td{color:#94a3b8;font-style:italic}
.badge{display:inline-block;padding:.15rem .45rem;border-radius:999px;font-size:.7rem;font-weight:600}
.badge-success{background:#dcfce7;color:#16a34a}
.badge-warning{background:#fef3c7;color:#d97706}
.badge-danger{background:#fee2e2;color:#dc2626}
.cell-missing{color:#dc2626;font-weight:600}
.cell-missing:hover{background:#fef2f2}
.row-missing{background:#fef2f2}
.row-missing td{color:#dc2626!important}
.cell-edit{cursor:pointer;border-bottom:1px dashed #cbd5e1;padding:1px 2px}
.cell-edit:hover{background:#eff6ff;border-color:#2563eb}
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:100;padding:1rem}
.modal-content{background:#fff;border-radius:.75rem;padding:1.5rem;width:100%;max-width:500px;max-height:90vh;overflow-y:auto}
.modal-content h3{font-size:1rem;margin-bottom:.75rem}
.modal-content input,.modal-content select,.modal-content textarea{width:100%;padding:.6rem .75rem;border:1.5px solid #e2e8f0;border-radius:.5rem;font-size:.85rem;outline:none;margin-bottom:.5rem}
.modal-content input:focus,.modal-content select:focus,.modal-content textarea:focus{border-color:#2563eb}
.modal-actions{display:flex;gap:.5rem;margin-top:.75rem}
@media(max-width:640px){
  .topbar{flex-direction:column;align-items:stretch}
  .topbar-actions{justify-content:center}
  .filters{flex-direction:column}
  .filters select,.filters input{width:100%}
  .filters .search-wrap input{min-width:0;width:100%}
  .stats-grid{grid-template-columns:repeat(3,1fr)}
  .table-wrap{font-size:.7rem}
  .table-wrap td,.table-wrap th{padding:.35rem .4rem}
  .login-card{padding:1.5rem 1rem}
  .btn{padding:.35rem .6rem;font-size:.65rem}
}
</style>
</head>
<body>

<div id="login-screen" class="login-container">
  <div class="login-card">
    <h1>📋 Control de Ponches</h1>
    <p class="subtitle">Inicia sesión para continuar</p>
    <div style="display:flex;gap:.5rem;margin-bottom:1rem">
      <button id="login-admin-btn" class="btn btn-primary" onclick="showLoginForm('admin')" style="flex:1">Admin</button>
      <button id="login-emp-btn" class="btn btn-outline" onclick="showLoginForm('employee')" style="flex:1">Empleado</button>
    </div>
    <div id="login-form">
      <input id="login-password" type="password" placeholder="Contraseña de administrador" onkeydown="if(event.key==='Enter')doLogin()">
      <div id="login-employee-select" class="hidden">
        <input id="login-employee-search" type="text" placeholder="Buscar nombre..." oninput="filterEmployeeNames()" style="width:100%;padding:.75rem 1rem;border:1.5px solid #e2e8f0;border-radius:.65rem;font-size:.95rem;margin-bottom:.5rem;outline:none">
        <select id="login-employee-name" style="width:100%;padding:.75rem 1rem;border:1.5px solid #e2e8f0;border-radius:.65rem;font-size:.95rem;margin-bottom:.75rem;outline:none;background:#fff">
          <option value="">Selecciona tu nombre</option>
        </select>
        <input id="login-employee-code" type="password" placeholder="Número de tarjeta" onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <button class="btn btn-primary" onclick="doLogin()" style="margin-top:.5rem">Entrar</button>
      <div id="login-error" class="error"></div>
    </div>
  </div>
</div>

<div id="app" class="app-container hidden">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:.5rem">
      <h2>📋 Control de Ponches</h2>
      <span id="user-badge" class="badge"></span>
    </div>
    <div class="topbar-actions">
      <button class="btn btn-outline btn-sm admin-only" onclick="showUploadModal()">📤 Importar</button>
      <button class="btn btn-outline btn-sm" onclick="exportExcel()">📤 Exportar</button>
      <button class="btn btn-outline btn-sm admin-only" onclick="showAddModal()">➕ Agregar</button>
      <button class="btn btn-outline btn-sm admin-only" onclick="mergeDuplicados()" style="color:#dc2626">🔀 Unificar días</button>
      <button class="btn btn-outline btn-sm admin-only" onclick="syncToGitHub()">☁️ Subir datos</button>
      <button class="btn btn-outline btn-sm" onclick="logout()" style="color:#dc2626">🚪 Salir</button>
    </div>
  </div>

  <div class="filters">
    <select id="view-select" onchange="init()" class="admin-only">
      <option value="store">🏬 Por tienda</option>
      <option value="employee">👤 Por empleado</option>
    </select>
    <select id="month-filter" onchange="init()">
      <option value="">Todos los meses</option>
    </select>
    <div class="search-wrap">
      <span>🔍</span>
      <input id="search-input" placeholder="Buscar por tienda, nombre, código..." oninput="debouncedSearch()">
    </div>
    <button class="btn btn-outline btn-sm admin-only" onclick="exportExcel()">📤 Exportar Todo</button>
    <button class="btn btn-outline btn-sm admin-only" onclick="deleteMonth()" style="color:#dc2626">🗑️ Eliminar mes</button>
  </div>

  <div class="stats-grid" id="stats-grid"></div>
  <div class="table-wrap" id="table-wrap"></div>

<!-- Modals -->
<div id="upload-modal" class="modal-overlay hidden" onclick="if(event.target===this)closeModal('upload-modal')">
  <div class="modal-content">
    <h3>📤 Importar Excel / CSV</h3>
    <div id="upload-body">
      <input type="file" id="file-input" accept=".xlsx,.xls,.csv" onchange="handleFile(this.files[0])">
    </div>
    <div id="map-config"></div>
    <div id="upload-actions"></div>
  </div>
</div>

<div id="add-modal" class="modal-overlay hidden" onclick="if(event.target===this)closeModal('add-modal')">
  <div class="modal-content">
    <h3>➕ Agregar registro</h3>
    <input id="add-codigo" placeholder="Código empleado">
    <input id="add-empleado" placeholder="Nombre">
    <input id="add-tienda" placeholder="Tienda">
    <input id="add-fecha" type="date">
    <input id="add-entrada" type="time" placeholder="Entrada">
    <input id="add-salida" type="time" placeholder="Salida">
    <div class="modal-actions">
      <button class="btn btn-primary" onclick="saveAdd()">Guardar</button>
      <button class="btn btn-outline" onclick="closeModal('add-modal')">Cancelar</button>
    </div>
  </div>
</div>

<script>
// ===================== STATE =====================
let allData = [];
let userRole = null;
let userCodigo = null;
let uploadedRows = [];
let uploadedHeaders = [];
let debounceTimer = null;

// ===================== LOGIN =====================
function showLoginForm(role) {
  document.getElementById('login-admin-btn').className = role === 'admin' ? 'btn btn-primary' : 'btn btn-outline';
  document.getElementById('login-emp-btn').className = role === 'employee' ? 'btn btn-primary' : 'btn btn-outline';
  document.getElementById('login-password').classList.toggle('hidden', role !== 'admin');
  document.getElementById('login-employee-select').classList.toggle('hidden', role !== 'employee');
  document.getElementById('login-error').textContent = '';
  if (role === 'employee') {
    document.getElementById('login-employee-search').value = '';
    populateEmployeeNames('');
  }
}

function populateEmployeeNames(filter) {
  const f = (filter||'').toLowerCase();
  const names = [...new Set(allData.map(r => r.empleado).filter(Boolean))].sort().filter(n => !f || n.toLowerCase().includes(f));
  const sel = document.getElementById('login-employee-name');
  sel.innerHTML = '<option value="">Selecciona tu nombre</option>' + names.map(n => `<option value="${n}">${n}</option>`).join('');
}

function filterEmployeeNames() {
  populateEmployeeNames(document.getElementById('login-employee-search').value);
}

function doLogin() {
  const role = document.getElementById('login-admin-btn').classList.contains('btn-primary') ? 'admin' : 'employee';
  if (role === 'admin') {
    const pw = document.getElementById('login-password').value;
    if (pw !== 'admin123') return document.getElementById('login-error').textContent = 'Contraseña incorrecta';
    userRole = 'admin'; userCodigo = null;
  } else {
    const name = document.getElementById('login-employee-name').value;
    const code = document.getElementById('login-employee-code').value;
    if (!name || !code) return document.getElementById('login-error').textContent = 'Selecciona tu nombre y escribe tu número de tarjeta';
    const match = allData.find(r => r.empleado === name && r.codigo === code);
    if (!match) return document.getElementById('login-error').textContent = 'Nombre o tarjeta incorrectos';
    userRole = 'employee'; userCodigo = code;
  }
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.querySelectorAll('.admin-only').forEach(el => el.style.display = userRole === 'admin' ? '' : 'none');
  document.getElementById('user-badge').textContent = userRole === 'admin' ? 'Admin' : 'Tarjeta: ' + userCodigo;
  init();
}

function logout() {
  userRole = null; userCodigo = null;
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('app').classList.add('hidden');
  document.getElementById('login-password').value = '';
  document.getElementById('login-employee-code').value = '';
  document.getElementById('login-error').textContent = '';
  document.getElementById('login-admin-btn').className = 'btn btn-primary';
  document.getElementById('login-emp-btn').className = 'btn btn-outline';
  document.getElementById('login-password').classList.remove('hidden');
  document.getElementById('login-employee-select').classList.add('hidden');
}

function loadFromGitHub() {
  if (location.protocol === 'file:') return;
  fetch('https://api.github.com/repos/yoneydy/ponche.1.0.b/contents/data/ponches.json', { headers: { Accept: 'application/vnd.github+json' } })
    .then(r => { if (!r.ok) throw new Error('no data'); return r.json(); })
    .then(resp => {
      const json = JSON.parse(decodeURIComponent(escape(atob(resp.content))));
      if (Array.isArray(json) && json.length > 0) { allData = json; saveData(); }
    }).catch(e => {});
}

function getGitHubToken() {
  let token = localStorage.getItem('gh_token');
  if (!token) { token = prompt('Ingresa el token de GitHub (solo una vez, se guarda automáticamente):'); if (token) localStorage.setItem('gh_token', token); }
  return token;
}
function syncToGitHub() {
  if (location.protocol === 'file:') {
    alert('Abre la página desde:\nhttps://yoneydy.github.io/ponche.1.0.b/\npara poder subir los datos.');
    return;
  }
  const token = getGitHubToken();
  if (!token) return;
  const content = btoa(unescape(encodeURIComponent(JSON.stringify(allData, null, 2))));
  const url = 'https://api.github.com/repos/yoneydy/ponche.1.0.b/contents/data/ponches.json';
  fetch(url, { headers: { Authorization: 'Bearer ' + token, Accept: 'application/vnd.github+json' } })
    .then(r => r.json())
    .then(existing => {
      const body = { message: 'sync ' + new Date().toISOString(), content: content };
      if (existing.sha) body.sha = existing.sha;
      return fetch(url, { method: 'PUT', headers: { Authorization: 'Bearer ' + token, 'Content-Type': 'application/json', Accept: 'application/vnd.github+json' }, body: JSON.stringify(body) });
    })
    .then(r => r.json())
    .then(res => {
      if (res.content) alert('✅ Datos subidos. Todos los dispositivos verán los cambios al recargar.');
      else alert('Error: ' + (res.message || ''));
    })
    .catch(e => alert('Error de conexión: ' + e.message));
}

// ===================== INIT =====================
function getVisibleData() {
  return userRole === 'employee' && userCodigo ? allData.filter(r => r.codigo === userCodigo) : allData;
}

document.addEventListener('DOMContentLoaded', function() {
  loadFromGitHub();
  loadData();
  document.getElementById('login-screen').classList.remove('hidden');
  showLoginForm('admin');
});

// ===================== STORAGE =====================
function loadData() {
  try { allData = JSON.parse(localStorage.getItem('ponchesData')) || []; } catch(e) { allData = []; }
  const curY = new Date().getFullYear();
  let fixed = 0;
  for (const r of allData) {
    if (!r.fecha) continue;
    // Fix dates containing "NaN"
    if (r.fecha.includes('NaN')) {
      r.fecha = r.fecha.replace(/NaN/g, '01');
    }
    const p = r.fecha.split('/');
    if (p.length === 3) {
      const y = +p[2];
      if (y >= 100 && y < 1000 && y === Math.floor(curY / 10)) { p[2] = String(curY); r.fecha = p.join('/'); fixed++; }
      else if (y < 100) { p[2] = String(2000 + y); r.fecha = p.join('/'); fixed++; }
    }
  }
  if (fixed) { saveData(); console.log('Fechas reparadas:', fixed); }
}
function saveData() { localStorage.setItem('ponchesData', JSON.stringify(allData)); }

// ===================== HELPERS =====================


function parseDateObj(v) {
  if (!v) return new Date(NaN);
  if (v instanceof Date && !isNaN(v)) return v;
  if (typeof v === 'number') { const d = new Date((v - 25569) * 86400 * 1000); if (!isNaN(d)) return d; }
  if (typeof v === 'string') {
    const p = v.split(/[\/\-]/);
    if (p.length === 3) {
      let d, m, y;
      if (v.includes('/')) { d=+p[0]; m=+p[1]; y=+p[2]; } else { y=+p[0]; m=+p[1]; d=+p[2]; }
      if (isNaN(y)) y = new Date().getFullYear();
      if (y < 100) y += 2000;
      if (y >= 100 && y < 1000 && y === Math.floor(new Date().getFullYear() / 10)) y = new Date().getFullYear();
      if (!isNaN(d) && !isNaN(m)) return new Date(y, m-1, d);
    }
  }
  const d = new Date(v); return isNaN(d) ? new Date(NaN) : d;
}
function extractDate(v) { const d = parseDateObj(v); return isNaN(d) ? (v||'') : `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`; }
function diaSemana(v) {
  const d = parseDateObj(v);
  if (isNaN(d)) return '';
  const dias = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  return dias[d.getDay()];
}
function getStatus(r) {
  if (!r.fecha) return '🔴 Sin ponche';
  const e = (r.entrada||'').trim(), s = (r.salida||'').trim();
  if (!e && !s) return '🔴 Sin ponche';
  if (e && s && e !== s) return '✅ Completo';
  return '⚠️ Incompleto';
}
function getMonthKey(v) { const d = parseDateObj(v); return isNaN(d) ? '' : `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; }
function getStatusBadge(s) {
  if (s.includes('✅')) return 'badge-success';
  if (s.includes('⚠️')) return 'badge-warning';
  return 'badge-danger';
}
function calcHoras(e, s) {
  if (!e || !s) return '---';
  const [eh, em] = e.split(':').map(Number);
  const [sh, sm] = s.split(':').map(Number);
  if (isNaN(eh)||isNaN(em)||isNaN(sh)||isNaN(sm)) return '---';
  let min = (sh*60+sm) - (eh*60+em);
  if (min < 0) min += 1440;
  const h = Math.floor(min/60), m = min%60;
  return h + 'h ' + m + 'm';
}

// ===================== INIT =====================
function init() {
  const data = getVisibleData();
  const sel = document.getElementById('month-filter');
  const opts = new Set();
  for (const r of data) { const mk = getMonthKey(r.fecha); if (mk) opts.add(mk); }
  const cur = sel.value;
  sel.innerHTML = '<option value="">Todos los meses</option>';
  for (const o of [...opts].sort()) sel.innerHTML += `<option value="${o}" ${o===cur?'selected':''}>${o}</option>`;

  renderDashboard();
  const view = document.getElementById('view-select').value;
  if (view === 'store') renderStoreView();
  else renderEmployeeView();
}

function debouncedSearch() {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => init(), 200);
}

// ===================== DASHBOARD =====================
function renderDashboard() {
  const selMonth = document.getElementById('month-filter').value;
  let filtered = getVisibleData();
  if (selMonth) filtered = filtered.filter(r => getMonthKey(r.fecha) === selMonth);
  const total = filtered.length;
  const completos = filtered.filter(r => getStatus(r).includes('✅')).length;
  const incompletos = filtered.filter(r => getStatus(r).includes('⚠️')).length;
  const sinponche = filtered.filter(r => getStatus(r).includes('🔴')).length;
  const tiendas = new Set(filtered.map(r=>r.tienda)).size;
  const empleados = new Set(filtered.map(r=>r.codigo)).size;
  document.getElementById('stats-grid').innerHTML = `
    <div class="stat-card"><div class="label">Registros</div><div class="value">${total}</div></div>
    <div class="stat-card"><div class="label">✅ Completos</div><div class="value" style="color:#16a34a">${completos}</div></div>
    <div class="stat-card"><div class="label">⚠️ Incompletos</div><div class="value" style="color:#d97706">${incompletos}</div></div>
    <div class="stat-card"><div class="label">🔴 Sin ponche</div><div class="value" style="color:#dc2626">${sinponche}</div></div>
    <div class="stat-card"><div class="label">Tiendas</div><div class="value">${tiendas}</div></div>
    <div class="stat-card"><div class="label">Empleados</div><div class="value">${empleados}</div></div>`;
}

// ===================== STORE VIEW =====================
function renderStoreView() {
  const q = (document.getElementById('search-input').value||'').toLowerCase();
  const selMonth = document.getElementById('month-filter').value;
  let filtered = getVisibleData();
  if (selMonth) filtered = filtered.filter(r => getMonthKey(r.fecha) === selMonth);
  if (q) filtered = filtered.filter(r => (r.empleado||'').toLowerCase().includes(q) || (r.codigo||'').includes(q) || (r.tienda||'').toLowerCase().includes(q));

  const groups = {};
  for (const r of filtered) {
    const store = r.tienda || 'Sin tienda';
    if (!groups[store]) groups[store] = {};
    const emp = r.codigo || '???';
    if (!groups[store][emp]) groups[store][emp] = { empleado: r.empleado||'', records: [] };
    groups[store][emp].records.push(r);
  }

  const sortedStores = Object.keys(groups).sort();
  let html = '<table><thead><tr><th>Tienda</th><th>Fecha</th><th>Día</th><th>Entrada</th><th>Salida</th><th>Total</th><th>Estado</th><th>Reporte</th></tr></thead><tbody>';
  for (const store of sortedStores) {
    const emps = Object.keys(groups[store]).sort();
    let storeFirst = true;
    for (const emp of emps) {
      const empInfo = groups[store][emp];
      const sortedRecs = [...empInfo.records].sort((a,b) => (a.fecha||'').localeCompare(b.fecha||''));

      // Employee header in blue
      html += `<tr style="background:#eef2ff"><td colspan="6" style="padding:.4rem .65rem;font-weight:600;color:#4f46e5;font-size:.85rem">${emp} - ${empInfo.empleado||''}${store ? ' | ' + store : ''}</td>
        <td style="text-align:right;padding:.4rem .65rem"><button class="btn btn-outline btn-sm" onclick="exportEmp('${emp}')" title="Exportar empleado">📤</button></td></tr>`;
      // Column sub-header per employee
      html += `<tr style="background:#f8fafc"><td style="font-size:.65rem;color:#94a3b8;font-weight:600">Tienda</td><td style="font-size:.65rem;color:#94a3b8;font-weight:600">Fecha</td><td style="font-size:.65rem;color:#94a3b8;font-weight:600">Día</td><td style="font-size:.65rem;color:#94a3b8;font-weight:600">Entrada</td><td style="font-size:.65rem;color:#94a3b8;font-weight:600">Salida</td><td style="font-size:.65rem;color:#94a3b8;font-weight:600">Total</td><td style="font-size:.65rem;color:#94a3b8;font-weight:600">Estado</td><td style="font-size:.65rem;color:#94a3b8;font-weight:600">Reporte</td></tr>`;

      let rows = [];
      if (selMonth) {
        const [y,m] = selMonth.split('-');
        const totalDays = new Date(+y, +m, 0).getDate();
        const existingMap = {};
        for (const r of sortedRecs) {
          const d = parseDateObj(r.fecha);
          if (!isNaN(d)) existingMap[d.getDate()] = r;
        }
        for (let day = 1; day <= totalDays; day++) {
          const dd = new Date(+y, +m-1, day);
          if (dd.getDay() === 0) continue;
          if (existingMap[day]) rows.push({ type: 'record', data: existingMap[day] });
          else rows.push({ type: 'missing', day, fecha: `${String(day).padStart(2,'0')}/${String(m).padStart(2,'0')}/${y}` });
        }
      } else {
        rows = sortedRecs.map(r => ({ type: 'record', data: r }));
      }

      for (const row of rows) {
        if (row.type === 'missing') {
          html += `<tr class="row-missing">
            <td>${storeFirst ? store : ''}</td>
            <td class="cell-missing">${row.fecha}</td>
            <td class="cell-missing">${diaSemana(row.fecha)}</td>
            <td><span class="cell-edit cell-missing" onclick="addMissing('${emp}','${(empInfo.empleado||'').replace(/'/g,"\\'")}','${store.replace(/'/g,"\\'")}','${row.fecha}','entrada')">+</span></td>
            <td><span class="cell-edit cell-missing" onclick="addMissing('${emp}','${(empInfo.empleado||'').replace(/'/g,"\\'")}','${store.replace(/'/g,"\\'")}','${row.fecha}','salida')">+</span></td>
            <td style="color:#dc2626">---</td>
            <td><span class="badge badge-danger">Sin ponche</span></td>
            <td><span class="cell-edit" onclick="reportarFalta('${emp}','${(empInfo.empleado||'').replace(/'/g,"\\'")}','${store.replace(/'/g,"\\'")}','${row.fecha}')" style="color:#2563eb;font-size:.7rem">Reporte</span></td>
          </tr>`;
          storeFirst = false; continue;
        }
        const r = row.data;
        const idx = allData.indexOf(r);
        const st = getStatus(r);
        const e = r.entrada||'', s = r.salida||'';
        const rowClass = (!e || !s || (e && s && e === s)) ? ' style="background:#fee2e2"' : '';
        const reportado = r.problema ? '⚠️' : '';
        const reportText = r.problema ? '<span style="font-size:.65rem;color:#64748b;margin-left:.2rem">'+r.problema.substring(0,25)+(r.problema.length>25?'…':'')+'</span>' : '';
        const reportTitle = r.problema ? ' title="'+r.problema.replace(/"/g,'&quot;')+'"' : '';
        const reportCell = r.problema ? '<span'+reportTitle+'>'+reportado+'</span>'+reportText : '<span class="cell-edit" onclick="reportarProblema('+idx+')" style="color:#2563eb;font-size:.7rem">Reporte</span>';
        html += `<tr${rowClass}>
          <td>${storeFirst ? store : ''}</td>
          <td>${extractDate(r.fecha)||''}</td>
          <td>${diaSemana(r.fecha)}</td>
          <td><span class="cell-edit${!e?' cell-missing':''}" onclick="editField(${idx},'entrada')">${e||'--'}</span></td>
          <td><span class="cell-edit${!s?' cell-missing':''}" onclick="editField(${idx},'salida')">${s||'--'}</span></td>
          <td>${calcHoras(e,s)}</td>
          <td><span class="badge ${getStatusBadge(st)}">${st}</span></td>
          <td>${reportCell}</td>
        </tr>`;
        storeFirst = false;
      }
    }
  }

  html += '</tbody></table>';
  if (Object.keys(groups).length === 0) html = '<div style="padding:2rem;text-align:center;color:#94a3b8">Sin registros para esta vista.</div>';
  document.getElementById('table-wrap').innerHTML = html;
}

  const empMap = {};

    const key = r.codigo || '???';

    html += '<table><thead><tr><th>Tienda</th><th>Fecha</th><th>Día</th><th>Entrada</th><th>Salida</th><th>Total</th><th>Estado</th><th>Reporte</th></tr></thead><tbody>';
    const sorted = [...emp.records].sort((a,b) => (a.fecha||'').localeCompare(b.fecha||''));
    for (const r of sorted) {
      const idx = allData.indexOf(r);
      const st = getStatus(r);
      const e = r.entrada||'', s = r.salida||'';
      const rowClass = (!e || !s || (e && s && e === s)) ? ' style="background:#fee2e2"' : '';
      const reportado = r.problema ? '⚠️' : '';
      const reportText = r.problema ? '<span style="font-size:.65rem;color:#64748b;margin-left:.2rem">'+r.problema.substring(0,25)+(r.problema.length>25?'…':'')+'</span>' : '';
      const reportTitle = r.problema ? ' title="'+r.problema.replace(/"/g,'&quot;')+'"' : '';
      const reportCell = r.problema ? '<span'+reportTitle+'>'+reportado+'</span>'+reportText : '<span class="cell-edit" onclick="reportarProblema('+idx+')" style="color:#2563eb;font-size:.7rem">Reporte</span>';
      html += `<tr${rowClass}>
        <td>${r.tienda||''}</td>
        <td>${extractDate(r.fecha)||''}</td>
        <td>${diaSemana(r.fecha)}</td>
        <td><span class="cell-edit${!e?' cell-missing':''}" onclick="editField(${idx},'entrada')">${e||'--'}</span></td>
        <td><span class="cell-edit${!s?' cell-missing':''}" onclick="editField(${idx},'salida')">${s||'--'}</span></td>
        <td>${calcHoras(e,s)}</td>
        <td><span class="badge ${getStatusBadge(st)}">${st}</span></td>
        <td>${reportCell}</td>
      </tr>`;
    }
    html += '</tbody></table>';
  } else {
    // Summary view
    const sorted = Object.values(empMap).sort((a,b) => a.empleado.localeCompare(b.empleado));
    html = '<table><thead><tr><th>Empleado</th><th>Código</th><th>Registros</th><th>Completos</th><th>Incompletos</th><th></th></tr></thead><tbody>';

    for (const emp of sorted) {
      let completos = 0, incompletos = 0, sinponche = 0;
      for (const r of emp.records) {
        const st = getStatus(r);
        if (st.includes('✅')) completos++;
        else if (st.includes('⚠️')) incompletos++;
        else sinponche++;
      }
      html += `<tr>
        <td><a href="#" onclick="window._selectedEmp='${emp.codigo}';init();return false" style="color:#2563eb;text-decoration:none;font-weight:600">${emp.empleado}</a></td>

  document.getElementById('table-wrap').innerHTML = html;

    document.getElementById('table-wrap').innerHTML = '<div style="padding:2rem;text-align:center;color:#94a3b8">Sin registros para esta vista.</div>';

}

function deleteEmployee(codigo, empleado) {
  if (!confirm(`Eliminar TODOS los registros de ${empleado} (código: ${codigo})?`)) return;
  if (!confirm('Esta acción no se puede deshacer. Continuar?')) return;
  const antes = allData.length;
  allData = allData.filter(r => r.codigo !== codigo);
  saveData();
  const eliminados = antes - allData.length;
  alert(`Empleado eliminado. ${eliminados} registros borrados.`);
  if (window._selectedEmp === codigo) window._selectedEmp = null;
  init();
}

function deleteMonth() {
  const selMonth = document.getElementById('month-filter').value;
  if (!selMonth) return alert('Selecciona un mes específico primero.');
  const [y, m] = selMonth.split('-');
  const mesNombre = new Date(+y, +m-1).toLocaleString('es', { month: 'long', year: 'numeric' });
  const aEliminar = allData.filter(r => getMonthKey(r.fecha) === selMonth);
  if (aEliminar.length === 0) return alert('No hay registros en ' + mesNombre);
  if (!confirm(`Eliminar ${aEliminar.length} registros de ${mesNombre}?`)) return;
  if (!confirm('Esta acción no se puede deshacer. Continuar?')) return;
  allData = allData.filter(r => getMonthKey(r.fecha) !== selMonth);
  saveData();
  alert(`Eliminados ${aEliminar.length} registros de ${mesNombre}.`);
  init();
}

// ===================== UPLOAD =====================
function showUploadModal() {
  document.getElementById('upload-body').innerHTML = '<input type="file" id="file-input" accept=".xlsx,.xls,.csv" onchange="handleFile(this.files[0])">';
  document.getElementById('map-config').innerHTML = '';
  document.getElementById('upload-actions').innerHTML = '<button class="btn btn-outline" onclick="closeModal(\'upload-modal\')">Cancelar</button>';
  document.getElementById('upload-modal').classList.remove('hidden');
}

function handleFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = new Uint8Array(e.target.result);
      const wb = XLSX.read(data, { type: 'array', cellDates: true });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const json = XLSX.utils.sheet_to_json(ws, { defval: '' });
      if (json.length === 0) return alert('El archivo está vacío');
      uploadedHeaders = Object.keys(json[0]);
      uploadedRows = json;
      document.getElementById('upload-body').innerHTML = `<div style="font-size:.8rem;color:#64748b;margin-bottom:.5rem">Archivo: ${file.name} (${json.length} filas)</div>`;
      document.getElementById('map-config').innerHTML = `<div style="font-size:.75rem;color:#64748b;margin-bottom:.5rem">Columnas detectadas: ${uploadedHeaders.join(', ')}</div>`;
      document.getElementById('upload-actions').innerHTML = `<button class="btn btn-success" onclick="confirmImport()">Confirmar importacion</button> <button class="btn btn-outline" onclick="closeModal('upload-modal')">Cancelar</button>`;
    } catch(err) { alert('Error al leer archivo: '+err.message); }
  };
  reader.readAsArrayBuffer(file);
}

function confirmImport() {
  const norm = h => h.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,' ').trim();
  const fieldMap = { codigo: null, empleado: null, nombre: null, apellido: null, tienda: null, fecha: null, entrada: null, salida: null };
  for (const h of uploadedHeaders) {
    const n = norm(h);
    if (!fieldMap.codigo && (n === 'codigo empleado' || n === 'codigo' || n === 'cod' || n === 'id' || n === 'matricula')) fieldMap.codigo = h;
    if (!fieldMap.nombre && (n === 'nombre' || n === 'nombre empleado' || n.startsWith('nombr'))) fieldMap.nombre = h;
    if (!fieldMap.apellido && (n === 'apellido' || n === 'apellidos')) fieldMap.apellido = h;
    if (!fieldMap.empleado && (n === 'empleado' || n === 'nombre' || n === 'apellido' || n.startsWith('nombr'))) fieldMap.empleado = h;
    if (!fieldMap.tienda && (n === 'tienda' || n === 'ubicacion' || n === 'sucursal' || n === 'lugar')) fieldMap.tienda = h;
    if (!fieldMap.fecha && (n === 'fecha' || n === 'date' || n === 'dia' || n === 'fech')) fieldMap.fecha = h;
    if (!fieldMap.entrada && (n.includes('entrada') || n.includes('llegada') || n.includes('inicio'))) fieldMap.entrada = h;
    if (!fieldMap.salida && (n.includes('salida') || n.includes('ida') || n.includes('fin'))) fieldMap.salida = h;
  }
  const missing = Object.entries(fieldMap).filter(([k,v]) => !v && k !== 'nombre' && k !== 'apellido').map(([k]) => k);
  if (missing.length > 0) return alert('No se detectaron columnas: '+missing.join(', '));

  function parseDate(v) {
    if (!v || v === true || v === false) return '';
    if (v instanceof Date && !isNaN(v)) return `${String(v.getUTCDate()).padStart(2,'0')}/${String(v.getUTCMonth()+1).padStart(2,'0')}/${v.getUTCFullYear()}`;
    if (typeof v === 'number') {
      let days = Math.floor(v);
      if (days >= 60) days--;
      const d = new Date(Date.UTC(1900, 0, days));
      if (!isNaN(d)) return `${String(d.getUTCDate()).padStart(2,'0')}/${String(d.getUTCMonth()+1).padStart(2,'0')}/${d.getUTCFullYear()}`;
    }
    if (typeof v === 'string') {
      // Skip if value is literally "NaN"
      if (v === 'NaN' || v === '#N/A' || v === '#REF!' || v === '#VALUE!' || v === '#DIV/0!') return '';
      const p = v.split(/[\/\-]/);
      if (p.length === 3) {
        const ex = s => { const m = String(s).match(/\d+/); return m ? +m[0] : NaN; };
        let d, m, y;
        if (v.includes('/')) { d=ex(p[0]); m=ex(p[1]); y=ex(p[2]); } else { y=ex(p[0]); m=ex(p[1]); d=ex(p[2]); }
        if (isNaN(y)) { d=ex(p[2]); y=ex(p[0]); }
        if (isNaN(d)) d = 1;
        if (isNaN(m)) m = 1;
        if (isNaN(y)) y = new Date().getFullYear();
        if (y < 100) y += 2000;
        if (y >= 100 && y < 1000 && y === Math.floor(new Date().getFullYear() / 10)) y = new Date().getFullYear();
        return `${String(d).padStart(2,'0')}/${String(m).padStart(2,'0')}/${y}`;
      }
      if (p.length === 2) {
        const ex = s => { const m = String(s).match(/\d+/); return m ? +m[0] : NaN; };
        let m = ex(p[0]), y = ex(p[1]);
        if (isNaN(m) || isNaN(y)) { m = ex(p[1]); y = ex(p[0]); }
        if (y < 100) y += 2000;
        if (y >= 100 && y < 1000 && y === Math.floor(new Date().getFullYear() / 10)) y = new Date().getFullYear();
        if (!isNaN(m) && !isNaN(y)) return `01/${String(m).padStart(2,'0')}/${y}`;
      }
    }
    return String(v).trim();
  }

  const count = uploadedRows.length;
  for (const row of uploadedRows) {
    const r = {
      codigo: String(row[fieldMap.codigo]||'').trim(),
      empleado: fieldMap.nombre || fieldMap.apellido
        ? [fieldMap.nombre ? String(row[fieldMap.nombre]||'').trim() : '', fieldMap.apellido ? String(row[fieldMap.apellido]||'').trim() : ''].filter(Boolean).join(' ')
        : String(row[fieldMap.empleado]||'').trim(),
      tienda: String(row[fieldMap.tienda]||'').trim(),
      fecha: parseDate(row[fieldMap.fecha]),
      entrada: String(row[fieldMap.entrada]||'').trim(),
      salida: fieldMap.salida ? String(row[fieldMap.salida]||'').trim() : '',
    };
    if (r.codigo && r.fecha) allData.push(r);
  }

  saveData();
  closeModal('upload-modal');
  init();
}

// ===================== ADD =====================
function showAddModal() {
  document.getElementById('add-codigo').value = '';
  document.getElementById('add-empleado').value = '';
  document.getElementById('add-tienda').value = '';
  document.getElementById('add-fecha').value = new Date().toISOString().split('T')[0];
  document.getElementById('add-entrada').value = '';
  document.getElementById('add-salida').value = '';
  document.getElementById('add-modal').classList.remove('hidden');
}
function saveAdd() {
  const codigo = document.getElementById('add-codigo').value.trim();
  const empleado = document.getElementById('add-empleado').value.trim();
  const tienda = document.getElementById('add-tienda').value.trim();
  const fechaRaw = document.getElementById('add-fecha').value;
  if (!codigo || !fechaRaw) return alert('Código y fecha requeridos');
  const d = new Date(fechaRaw);
  const fecha = `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
  allData.push({
    codigo, empleado, tienda, fecha,
    entrada: document.getElementById('add-entrada').value,
    salida: document.getElementById('add-salida').value,
  });
  saveData();
  closeModal('add-modal');
  init();
}

function editField(idx, field) {
  if (userRole !== 'admin') return alert('Solo el administrador puede editar registros.');
  let r = allData[idx];
  if (!r) {
    const codigo = prompt('Código del empleado:');
    const fecha = prompt('Fecha (dd/mm/aaaa):');
    if (!codigo || !fecha) return;
    r = allData.find(x => x.codigo === codigo && x.fecha === fecha);
    if (!r) return alert('Registro no encontrado');
  }
  const label = field === 'entrada' ? 'Entrada' : 'Salida';
  const val = prompt(`Nueva ${label} (HH:MM):`, r[field]||'');
  if (val === null) return;
  r[field] = val.trim();
  saveData();
  init();
}
function addMissing(codigo, empleado, tienda, fecha, field) {
  if (userRole !== 'admin') return alert('Solo el administrador puede agregar registros.');
  let r = allData.find(x => x.codigo === codigo && x.fecha === fecha);
  if (!r) {
    r = { codigo, empleado, tienda, fecha, entrada: '', salida: '' };
    allData.push(r);
  }
  const label = field === 'entrada' ? 'Entrada' : 'Salida';
  const val = prompt(`Hora de ${label} (HH:MM):`);
  if (!val) return;
  r[field] = val.trim();
  saveData();
  init();
}
function reportarProblema(idx) {
  const r = allData[idx];
  if (!r) return;
  const desc = prompt('Comentario para ' + extractDate(r.fecha) + ':');
  if (!desc) return;
  r.problema = desc.trim();
  saveData();
  init();
}
function reportarFalta(codigo, empleado, tienda, fecha) {
  let r = allData.find(x => x.codigo === codigo && x.fecha === fecha);
  if (!r) {
    r = { codigo, empleado, tienda, fecha, entrada: '', salida: '' };
    allData.push(r);
  }
  const desc = prompt('Comentario para la falta del ' + fecha + ':');
  if (!desc) { if (!r.entrada && !r.salida && !r.problema) allData.pop(); return; }
  r.problema = desc.trim();
  saveData();
  init();
}
function exportEmp(codigo) {
  const selMonth = document.getElementById('month-filter').value;
  let data = allData.filter(r => r.codigo === codigo);
  if (selMonth) data = data.filter(r => getMonthKey(r.fecha) === selMonth);
  if (data.length === 0) return alert('Sin registros para exportar');
  data = [...data].sort((a,b) => (a.fecha||'').localeCompare(b.fecha||''));
  const emp = `${data[0].codigo} - ${data[0].empleado||''}`;
  const rows = [{ Codigo: emp, Empleado: '', Tienda: '', Fecha: '', Entrada: '', Salida: '', Estado: '' }];
  rows.push({ Codigo: '', Empleado: '', Tienda: 'Tienda', Fecha: 'Fecha', Entrada: 'Entrada', Salida: 'Salida', Estado: 'Estado' });
  for (const r of data) {
    rows.push({ Codigo: '', Empleado: '', Tienda: r.tienda, Fecha: extractDate(r.fecha), Entrada: r.entrada||'', Salida: r.salida||'', Estado: getStatus(r) });
  }
  const ws = XLSX.utils.json_to_sheet(rows, { header: ['Codigo','Empleado','Tienda','Fecha','Entrada','Salida','Estado'] });
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Ponches');
  XLSX.writeFile(wb, `empleado_${codigo}.xlsx`);
}

// ===================== MERGE =====================
function mergeDuplicados() {
  const antes = allData.length;
  const grupos = {};
  for (const r of allData) {
    const key = r.codigo + '|' + r.fecha;
    if (!grupos[key]) grupos[key] = [];
    grupos[key].push(r);
  }
  const nuevos = [];
  for (const key of Object.keys(grupos)) {
    const recs = grupos[key];
    if (recs.length === 1) { nuevos.push(recs[0]); continue; }
    const entradas = recs.filter(r => r.entrada).map(r => r.entrada).sort();
    const salidas = recs.filter(r => r.salida).map(r => r.salida).sort();
    nuevos.push({
      codigo: recs[0].codigo,
      empleado: recs[0].empleado,
      tienda: recs[0].tienda,
      fecha: recs[0].fecha,
      entrada: entradas.length ? entradas[0] : '',
      salida: salidas.length ? salidas[salidas.length - 1] : '',
    });
  }
  allData = nuevos;
  saveData();
  const unificados = antes - allData.length;
  alert(unificados + ' registros unificados. Quedan ' + allData.length + ' registros.');
  init();
}

// ===================== EXPORT =====================
function exportExcel() {
  const selMonth = document.getElementById('month-filter').value;
  let data = getVisibleData();
  if (selMonth) data = data.filter(r => getMonthKey(r.fecha) === selMonth);
  data = [...data].sort((a,b) => (a.tienda||'').localeCompare(b.tienda||'') || (a.codigo||'').localeCompare(b.codigo||'') || (a.fecha||'').localeCompare(b.fecha||''));

  const rows = [];
  let lastStore = '', lastEmp = '';
  for (const r of data) {
    const store = r.tienda || 'Sin tienda';
    const emp = `${r.codigo} - ${r.empleado||''}`;
    if (store !== lastStore) {
      rows.push({ Codigo: 'TIENDA: ' + store, Empleado: '', Tienda: '', Fecha: '', Entrada: '', Salida: '', Estado: '' });
      lastStore = store; lastEmp = '';
    }
    if (emp !== lastEmp) {
      rows.push({ Codigo: '  ' + emp, Empleado: '', Tienda: '', Fecha: '', Entrada: '', Salida: '', Estado: '' });
      lastEmp = emp;
    }
    rows.push({ Codigo: '', Empleado: '', Tienda: store, Fecha: extractDate(r.fecha), Entrada: r.entrada||'', Salida: r.salida||'', Estado: getStatus(r) });
  }

  const ws = XLSX.utils.json_to_sheet(rows, { header: ['Codigo','Empleado','Tienda','Fecha','Entrada','Salida','Estado'] });
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Ponches');
  XLSX.writeFile(wb, 'ponches_export.xlsx');
}
